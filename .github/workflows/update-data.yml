name: Update Water Data

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas openpyxl requests

      - name: Fetch API data
        run: python fetch_api_data.py

      - name: Process data and generate data.json
        run: python process_data.py

      - name: Commit updated data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json api_historical_raw.csv
          git diff --staged --quiet && echo "No changes" || git commit -m "Auto-update data.json $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
